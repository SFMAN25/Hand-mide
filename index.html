<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nesma Art Bags | الفخامة اليدوية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@1&family=Cairo:wght@300;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --near-black: #1a1a1a;
            --white: #ffffff;
            --grey: #888;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Cairo', sans-serif;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .logo-center img {
            max-height: 150px; 
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        nav {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 0;
        }

        nav a {
            text-decoration: none;
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .products-grid {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .product-card {
            background: var(--near-black);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: 0.4s;
        }

        .product-card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .product-card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 5px;
            background-color: #222; /* لون احتياطي لو الصورة اتأخرت */
        }

        .product-info h3 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            margin: 15px 0;
        }

        .price-container { margin-bottom: 20px; }
        .old-price { text-decoration: line-through; color: var(--grey); margin-left: 10px; }
        .new-price { font-size: 1.5rem; color: var(--white); font-weight: bold; }

        .btn-gold {
            display: inline-block;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px 30px;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            transition: 0.4s;
        }

        .btn-gold:hover { background: var(--gold); color: var(--black); }

        footer {
            padding: 40px 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            text-align: center;
        }

        .social-box a { color: var(--gold); font-size: 1.5rem; margin: 0 15px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-center">
            <img src="https://i.ibb.co/C2S4yXw/WN4RqfMZ.png" alt="Nesma Art Bags Logo">
        </div>
        <nav>
            <a href="#collection">المجموعة - COLLECTION</a>
        </nav>
    </header>

    <div class="products-grid" id="collection">
        
        <div class="product-card">
            <img src="https://i.ibb.co/M604v7y/Xx0r2gBb.jpg" alt="حقيبة القطيفة الملكية">
            <div class="product-info">
                <h3>The Royal Velvet</h3>
                <div class="price-container">
                    <span class="old-price">650 EGP</span>
                    <span class="new-price">450 EGP</span>
                </div>
                <a href="https://wa.me/201289685354?text=أريد طلب حقيبة القطيفة الملكية" class="btn-gold">Order Now</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://i.ibb.co/q9mNMT0/3yskCksx.jpg" alt="حقيبة الزمرد">
            <div class="product-info">
                <h3>Emerald Elegance</h3>
                <div class="price-container">
                    <span class="old-price">600 EGP</span>
                    <span class="new-price">400 EGP</span>
                </div>
                <a href="https://wa.me/201289685354?text=أريد طلب حقيبة الزمرد" class="btn-gold">Order Now</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://i.ibb.co/YPX0vYk/LzXsXfFK.jpg" alt="حقيبة القلوب">
            <div class="product-info">
                <h3>The Heart Bloom</h3>
                <div class="price-container">
                    <span class="old-price">650 EGP</span>
                    <span class="new-price">450 EGP</span>
                </div>
                <a href="https://wa.me/201289685354?text=أريد طلب حقيبة القلوب" class="btn-gold">Order Now</a>
            </div>
        </div>

        <div class="product-card">
            <img src="https://i.ibb.co/51p6rKm/23jpmY0N.jpg" alt="حقيبة القطيفة المضلعة">
            <div class="product-info">
                <h3>Merlot Ribbed Velvet</h3>
                <div class="price-container">
                    <span class="old-price">650 EGP</span>
                    <span class="new-price">450 EGP</span>
                </div>
                <a href="https://wa.me/201289685354?text=أريد طلب حقيبة القطيفة المضلعة" class="btn-gold">Order Now</a>
            </div>
        </div>

    </div>

    <footer>
        <div class="social-box">
            <a href="https://www.facebook.com/profile.php?id=61587569047782" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://whatsapp.com/channel/0029Vb74Eg39mrGTL6GyD12h" target="_blank"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.tiktok.com/@nesma.art.bags" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
        <p style="margin-top: 20px; font-size: 0.7rem; color: var(--grey);">© 2026 NESMA ART BAGS</p>
    </footer>

</body>
</html>
