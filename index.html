<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nesma Art Bags | نسمة آرت باجز</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Playfair+Display:wght@600&display=swap');

    :root {
      /* ألوان أنثوية وأنيقة تناسب الحقائب اليدوية */
      --brand-color: #d4a373; /* لون جملي دافئ */
      --accent-color: #faedcd;
      --dark-text: #333;
      --white: #ffffff;
      --facebook: #1877F2;
      --whatsapp: #25D366;
      --tiktok: #000000;
    }

    * { box-sizing: border-box; scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background-color: #fefae0;
      color: var(--dark-text);
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 5%;
      background-color: rgba(255, 255, 255, 0.95);
      position: fixed;
      width: 100%;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.05);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--brand-color);
      font-weight: bold;
      text-decoration: none;
    }

    nav a {
      text-decoration: none;
      color: var(--dark-text);
      margin: 0 10px;
      font-weight: 700;
      transition: 0.3s;
    }

    nav a:hover { color: var(--brand-color); }

    .hero {
      height: 80vh;
      background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                  url('https://images.unsplash.com/photo-1590874103328-eac38a683ce7?auto=format&fit=crop&w=1200&q=80');
      background-size: cover;
      background-position: center;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    .hero h1 { font-size: 3.5rem; margin-bottom: 0; font-family: 'Playfair Display', serif; }

    .section-title { margin: 50px 0; font-size: 2rem; color: var(--brand-color); }

    /* شبكة المنتجات */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      padding: 0 5%;
      max-width: 1200px;
      margin: 0 auto 50px auto;
    }

    .product-card {
      background: var(--white);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: transform 0.3s;
    }

    .product-card:hover { transform: translateY(-10px); }

    .product-card img { width: 100%; height: 300px; object-fit: cover; }

    .product-info { padding: 20px; text-align: center; }

    .price { color: var(--brand-color); font-weight: bold; font-size: 1.3rem; display: block; margin: 10px 0; }

    .order-btn {
      display: inline-block;
      background: var(--whatsapp);
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 0.9rem;
      font-weight: bold;
    }

    /* الروابط الاجتماعية */
    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }

    .social-icon {
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      font-size: 0.9rem;
      transition: 0.3s;
    }

    .fb { background-color: var(--facebook); }
    .wa { background-color: var(--whatsapp); }
    .tk { background-color: var(--tiktok); }

    .social-icon:hover { opacity: 0.8; transform: scale(1.1); }

    footer {
      background: #333;
      color: white;
      padding: 40px 20px;
      text-align: center;
      margin-top: 50px;
    }

    /* زر اللغة */
    #lang-toggle {
      background: var(--brand-color);
      color: white;
      border: none;
      padding: 5px 15px;
      border-radius: 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <header>
    <a href="#" class="logo">Nesma Art Bags</a>
    <nav>
      <a href="#home" data-ar="الرئيسية" data-en="Home">الرئيسية</a>
      <a href="#products" data-ar="المجموعة" data-en="Collection">المجموعة</a>
      <a href="#contact" data-ar="تواصل معنا" data-en="Contact">تواصل معنا</a>
      <button id="lang-toggle">EN</button>
    </nav>
  </header>

  <section class="hero" id="home">
    <div>
      <h1 data-ar="نسمة آرت باجز" data-en="Nesma Art Bags">نسمة آرت باجز</h1>
      <p data-ar="حقائب يدوية صُنعت خصيصاً لتناسب تميزك" data-en="Handmade bags crafted for your uniqueness">
        حقائب يدوية صُنعت خصيصاً لتناسب تميزك
      </p>
    </div>
  </section>

  <section id="products">
    <h2 class="section-title" data-ar="أحدث الموديلات" data-en="Latest Models">أحدث الموديلات</h2>
    
    <div class="product-grid">
      
      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500" alt="Bag">
        <div class="product-info">
          <h3 data-ar="حقيبة كروشيه كلاسيك" data-en="Classic Crochet Bag">حقيبة كروشيه كلاسيك</h3>
          <span class="price">350 EGP</span>
          <a href="https://wa.me/201234567890" class="order-btn" data-ar="اطلبي الآن" data-en="Order Now">اطلبي الآن</a>
        </div>
      </div>

      <div class="product-card">
        <img src="https://images.unsplash.com/photo-1591561954557-26941169b49e?w=500" alt="Bag">
        <div class="product-info">
          <h3 data-ar="حقيبة يد صيفية" data-en="Summer Handbag">حقيبة يد صيفية</h3>
          <span class="price">450 EGP</span>
          <a href="https://wa.me/201234567890" class="order-btn" data-ar="اطلبي الآن" data-en="Order Now">اطلبي الآن</a>
        </div>
      </div>

    </div>
  </section>

  <section id="contact" style="background: var(--accent-color); padding: 60px 20px;">
    <h2 data-ar="تابعينا على منصات التواصل" data-en="Follow us on Social Media">تابعينا على منصات التواصل</h2>
    
    <div class="social-links">
      <a href="https://www.facebook.com/profile.php?id=61587569047782" class="social-icon fb" target="_blank">Facebook</a>
      <a href="https://whatsapp.com/channel/0029Vb74Eg39mrGTL6GyD12h" class="social-icon wa" target="_blank">WhatsApp Channel</a>
      <a href="https://www.tiktok.com/@nesma.art.bags?_r=1&_t=ZS-93lICTP0Re8" class="social-icon tk" target="_blank">TikTok</a>
    </div>
  </section>

  <footer>
    <p>© 2026 Nesma Art Bags | Designed with Love</p>
  </footer>

  <script>
    const langBtn = document.getElementById("lang-toggle");
    let currentLang = "ar";

    langBtn.addEventListener("click", () => {
      currentLang = currentLang === "ar" ? "en" : "ar";
      document.documentElement.lang = currentLang;
      document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
      langBtn.textContent = currentLang === "ar" ? "EN" : "ع";
      document.querySelectorAll("[data-ar]").forEach(el => {
        el.textContent = currentLang === "ar" ? el.dataset.ar : el.dataset.en;
      });
    });
  </script>

</body>
</html>
